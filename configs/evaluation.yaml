evaluation:
  metrics:
    - auroc
    - auprc
    - fpr_at_95_tpr
    - confusion_matrix
  positive_label: 1
  threshold_policy:
    name: report_operating_points
    operating_points:
      - fpr_at_95_tpr
      - threshold_from_validation_quantile
  validation_quantile_for_id_threshold: 0.95
  save_score_csv: true
  save_plots: true
